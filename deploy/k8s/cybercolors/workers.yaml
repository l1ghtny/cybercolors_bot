apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybercolors-indexer-worker
  namespace: cybercolors
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cybercolors-indexer-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cybercolors-indexer-worker
    spec:
      containers:
        - name: worker
          image: localhost:32000/cybercolors-backend:latest
          imagePullPolicy: Always
          command: ["python", "scripts/run_ai_knowledge_worker.py"]
          envFrom:
            - configMapRef:
                name: cybercolors-config
            - secretRef:
                name: cybercolors-app-secrets
                optional: true
          env:
            - name: PYTHONPATH
              value: /home/discord-bot
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cybercolors-db-pguser-backend
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cybercolors-db-pguser-backend
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
