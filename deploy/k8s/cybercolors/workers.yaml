---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybercolors-bot
  namespace: cybercolors
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cybercolors-bot
  template:
    metadata:
      labels:
        app: cybercolors-bot
    spec:
      containers:
        - name: bot
          image: localhost:32000/cybercolors-backend:latest
          imagePullPolicy: Always
          command: ["python", "main.py"]
          envFrom:
            - configMapRef:
                name: cybercolors-config
            - secretRef:
                name: cybercolors-app-secrets
                optional: true
          env:
            - name: PYTHONPATH
              value: /home/discord-bot
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cybercolors-db-pguser-backend
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cybercolors-db-pguser-backend
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
