apiVersion: v1
kind: ConfigMap
metadata:
  name: cybercolors-config
  namespace: cybercolors
data:
  DB_HOST: cybercolors-db-primary.cybercolors.svc
  DB_NAME: cybercolors
  DB_PORT: "5432"
  DB_ECHO: "false"
  DB_POOL_RECYCLE_SECONDS: "1800"
  BOT_API_URL: https://cybercolors-api.modral.app
  DASHBOARD_BASE_URL: https://cybercolors.modral.app
  CORS_ALLOWED_ORIGINS: https://cybercolors.lightny.pro,https://cybercolors.modral.app
  DASHBOARD_OAUTH_REDIRECT_URIS: https://cybercolors.modral.app/callback
  DASHBOARD_ALLOW_LOCAL_OAUTH_REDIRECTS: "false"
  DASHBOARD_SESSION_COOKIE_SECURE: "true"
  DASHBOARD_SESSION_COOKIE_SAMESITE: lax
  DASHBOARD_SESSION_TTL_SECONDS: "604800"
  DASHBOARD_ALLOW_LEGACY_BEARER_AUTH: "false"
  AI_MODEL: gpt-5.4-nano
  AI_KNOWLEDGE_EMBEDDING_PROVIDER: local
  AI_KNOWLEDGE_LOCAL_EMBEDDING_MODEL: BAAI/bge-m3
  AI_KNOWLEDGE_OPENAI_EMBEDDING_MODEL: text-embedding-3-small
  AI_KNOWLEDGE_EMBEDDING_DIMENSIONS: "1024"
  AI_ANSWER_TIMEOUT_SECONDS: "180"
  AI_REPLY_WEB_SEARCH_ENABLED: "true"
  AI_KNOWLEDGE_WORKER_BATCH_SIZE: "5"
  AI_KNOWLEDGE_WORKER_POLL_SECONDS: "10"
  AI_YOUTUBE_TRANSCRIPTION_PROVIDER: modal
  AI_YOUTUBE_TRANSCRIPTION_MODAL_APP_NAME: cybercolors-youtube-transcription
  AI_YOUTUBE_TRANSCRIPTION_MODAL_CALLABLE_TYPE: class
  AI_YOUTUBE_TRANSCRIPTION_MODAL_CLASS_NAME: YouTubeWhisperTranscriber
  AI_YOUTUBE_TRANSCRIPTION_MODAL_METHOD_NAME: transcribe_audio
  AI_YOUTUBE_TRANSCRIPTION_TIMEOUT_SECONDS: "1800"
  AI_YOUTUBE_AUDIO_MAX_BYTES: "262144000"
  AI_YOUTUBE_CAPTION_LANGUAGES: en
  MODAL_WHISPER_GPU: T4
  MODAL_WHISPER_MAX_CONTAINERS: "1"
  MODAL_WHISPER_SCALEDOWN_WINDOW: "30"
  WHISPER_BATCH_SIZE: "4"
  NEWCOMER_RELEASE_WORKER_BATCH_SIZE: "100"
  NEWCOMER_RELEASE_WORKER_INTERVAL_SECONDS: "60"
  EVIDENCE_S3_ENDPOINT: https://3976b304dd7e75b248d867d320740478.eu.r2.cloudflarestorage.com
  EVIDENCE_S3_BUCKET: modral-case-evidence
  EVIDENCE_S3_REGION: auto
  EVIDENCE_UPLOAD_TTL_SECONDS: "900"
  EVIDENCE_DOWNLOAD_TTL_SECONDS: "300"
  EVIDENCE_MAX_FILE_BYTES: "26214400"
