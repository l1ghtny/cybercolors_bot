apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: cybercolors-db
  namespace: cybercolors
spec:
  postgresVersion: 18
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: postgres-operator.crunchydata.com/cluster
                    operator: In
                    values:
                      - cybercolors-db
                  - key: postgres-operator.crunchydata.com/data
                    operator: In
                    values:
                      - postgres
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              postgres-operator.crunchydata.com/cluster: cybercolors-db
              postgres-operator.crunchydata.com/data: postgres
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
  backups:
    pgbackrest:
      configuration:
        - secret:
            name: cybercolors-db-pgbackrest-secrets
      global:
        repo1-path: /pgbackrest/cybercolors/cybercolors-db/repo1
        repo1-retention-diff: "14"
        repo1-retention-full: "4"
      repos:
        - name: repo1
          s3:
            bucket: modral-db-backup
            endpoint: 3976b304dd7e75b248d867d320740478.eu.r2.cloudflarestorage.com
            region: auto
          schedules:
            differential: "0 3 * * 1-6"
            full: "0 3 * * 0"
      manual:
        repoName: repo1
        options:
          - --type=full
  users:
    - name: backend
      databases:
        - cybercolors
      options: LOGIN
